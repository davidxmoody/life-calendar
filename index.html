const currentDate = new Date().toISOString().slice(0, 10)
const luckiness = Math.random()

let lastColor = "black"
for (const week of document.querySelectorAll(".week")) {
if (!week.classList.contains("week--future")) {
lastColor = week.style["background-color"]
} else if (week.getAttribute("data-start") < currentDate) {
week.style["background-color"] = lastColor
week.setAttribute("data-prob", "1")
} else if (week.getAttribute("data-prob") < luckiness) {
week.style.opacity = 0
}
}
